name: Build Radio APK
on: [push, workflow_dispatch] # Builds every time you save or when you click "Run"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug # Debug is faster and doesn't require signing

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: radio-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
